version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: aether_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aether_network

  backend:
    build: ./backend
    container_name: aether_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/aether_dispatch
      - JWT_SECRET=cyberpunk_secret_key_1337_aether_dispatch_key_99
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - aether_network

  frontend:
    build: ./frontend
    container_name: aether_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aether_network

volumes:
  mongo_data:

networks:
  aether_network:
    driver: bridge
